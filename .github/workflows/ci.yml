# Safe CI — runs on every pull_request with no secrets required.
#
# Scope: compile, lint, unit tests.
# No privileged steps, no relay submission, no live signing.
# See copilot-instructions.md for full secret / environment policy.

name: ci

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  # ── Python lint + unit tests ────────────────────────────────────────────────
  python-ci:
    name: Python lint & tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio web3 eth-abi aiohttp python-dotenv flask flask-cors

      - name: Run unit tests (pure Python, no secrets required)
        env:
          # Provide safe defaults so modules that read these at import time
          # don't fail in the no-secrets fork PR environment.
          APEX_POL_USD: "0.85"
          APEX_ETH_USD: "3500"
          APEX_RPC_URL: "https://polygon-rpc.com/"
          APEX_SEND_TX: "0"
          APEX_WAIT_RECEIPT: "0"
        run: |
          cd python
          python -m pytest apex_omega_core/tests/ -v --tb=short

  # ── Rust compile check ──────────────────────────────────────────────────────
  rust-ci:
    name: Rust compile check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check (no build artefacts committed)
        run: cargo check --all-targets
