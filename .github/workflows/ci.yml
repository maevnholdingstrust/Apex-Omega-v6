# Safe CI — runs on every pull_request (including forks).
# No secrets, no privileged steps, no live execution.
name: ci

on:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --locked -- -D warnings

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python dev dependencies
        run: pip install ruff

      - name: ruff check
        run: ruff check python/

      - name: ruff format --check
        run: ruff format --check python/

  build-and-unit-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Rust build ────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo test
        run: cargo test --workspace --locked

      # ── Python unit tests (no secrets) ────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: pytest (unit tests only — no network, no secrets)
        env:
          # Public non-secret config only; real RPC is not available here.
          CHAIN_ID: ${{ vars.CHAIN_ID || '137' }}
          NETWORK: ${{ vars.NETWORK || 'polygon' }}
        run: |
          pytest python/apex_omega_core/tests/ \
            --ignore=python/apex_omega_core/tests/test_integration.py \
            -q --tb=short
