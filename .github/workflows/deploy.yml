# Contract deployment and Polygonscan verification — manual trigger only.
#
# This workflow:
#   1. Requires a guard confirmation to prevent accidental deployment.
#   2. Runs inside the 'prod' GitHub environment, which must have
#      required-reviewer protection rules configured.
#   3. Builds the Rust/PyO3 extension wheel via maturin.
#   4. Deploys the chosen Solidity contract to Polygon mainnet using the
#      repo's own deploy_contracts.py (web3 + py-solc-x, no Hardhat).
#   5. Submits source code to Polygonscan for verification.
#   6. Updates contract_targets.py with the new address and commits it back.
#
# Required prod environment secrets:
#   POLYGON_RPC_URL, PRIVATE_KEY, POLYGONSCAN_API_KEY
#
# See .github/copilot-instructions.md for full secret / environment policy.

name: deploy

on:
  workflow_dispatch:
    inputs:
      contract:
        description: "Contract to deploy: 'institutional' or 'ultimate'"
        required: true
        type: choice
        options:
          - institutional
          - ultimate
      target_var:
        description: "Address variable to update in contract_targets.py"
        required: true
        type: choice
        options:
          - C1_TARGET
          - C2_TARGET
      confirm:
        description: "Type DEPLOY to confirm live contract deployment on Polygon mainnet"
        required: true
        type: string

# Default to read-only; the deploy job elevates to write for the address commit.
permissions:
  contents: read

jobs:
  # ── Safety guard — reject any run that does not have explicit confirmation ──
  guard:
    name: Confirm intent
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation input
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation input must be exactly 'DEPLOY'. Got: ${{ inputs.confirm }}"
            exit 1
          fi

  # ── Deployment — prod environment with approval gating ──────────────────────
  deploy-and-verify:
    name: Deploy & verify contracts (prod)
    needs: guard
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: write  # needed to commit the updated contract_targets.py

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      # ── Rust wheel (PyO3 / maturin) ─────────────────────────────────────────
      - name: Build Rust wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --out dist

      - name: Install Rust wheel
        run: pip install dist/*.whl

      # ── Python deployment dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: pip install "web3>=6.0.0" py-solc-x requests packaging

      # ── Deploy contract to Polygon mainnet and verify on Polygonscan ─────────
      - name: Deploy & verify contract
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          python python/deploy_contracts.py \
            --contract "${{ inputs.contract }}" \
            --rpc-url  "$POLYGON_RPC_URL" \
            --private-key "$PRIVATE_KEY" \
            --verify \
            --polygonscan-key "$POLYGONSCAN_API_KEY"

      # ── Extract the deployed address once; share it via step output ─────────────
      - name: Extract deployed address
        id: extract
        run: |
          ARTEFACT="/tmp/apex_${{ inputs.contract }}_deployed.json"
          if [ ! -f "${ARTEFACT}" ]; then
            echo "::error::Deployment artefact not found at ${ARTEFACT}. Did deploy_contracts.py succeed?"
            exit 1
          fi
          ADDR=$(python3 -c "
          import json, sys
          with open('${ARTEFACT}') as f:
              d = json.load(f)
          addr = d.get('contract_address', '')
          if not addr:
              print('contract_address missing from deployment artefact', file=sys.stderr)
              sys.exit(1)
          print(addr)
          ")
          echo "Deployed address: ${ADDR}"
          echo "address=${ADDR}" >> "$GITHUB_OUTPUT"

      # ── Update contract_targets.py (Python-based, format-independent) ─────────
      - name: Update contract_targets.py
        env:
          DEPLOYED_ADDRESS: ${{ steps.extract.outputs.address }}
        run: |
          python3 - <<'PYEOF'
          import os, re, pathlib, sys
          target_var  = "${{ inputs.target_var }}"
          new_address = os.environ["DEPLOYED_ADDRESS"]
          targets_file = pathlib.Path("python/apex_omega_core/core/contract_targets.py")
          src = targets_file.read_text()
          pattern = rf'^({re.escape(target_var)}\s*=\s*)["\'].*?["\']'
          replacement = rf'\g<1>"{new_address}"'
          updated, n = re.subn(pattern, replacement, src, flags=re.MULTILINE)
          if n == 0:
              sys.exit(f"Pattern for '{target_var}' not found in {targets_file}")
          targets_file.write_text(updated)
          print(f"Updated {target_var} → {new_address}")
          print(targets_file.read_text())
          PYEOF

      # ── Commit the updated address back to the repository ────────────────────
      - name: Commit updated contract address
        env:
          DEPLOYED_ADDRESS: ${{ steps.extract.outputs.address }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add python/apex_omega_core/core/contract_targets.py
          if git diff --cached --quiet; then
            echo "No address change to commit (address unchanged)."
            exit 0
          fi
          git commit -m "deploy: update ${{ inputs.target_var }} to ${DEPLOYED_ADDRESS} [skip ci]"
          git push

      # ── Summary ──────────────────────────────────────────────────────────────
      - name: Print deployment summary
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, sys
          artefact = pathlib.Path("/tmp/apex_${{ inputs.contract }}_deployed.json")
          try:
              d = json.loads(artefact.read_text())
          except Exception as exc:
              sys.exit(f"Could not read deployment artefact: {exc}")
          sep = "=" * 60
          print(sep)
          print(f"  Contract : {d.get('contract_key', 'n/a')}")
          print(f"  Address  : {d.get('contract_address', 'n/a')}")
          print(f"  Tx hash  : {d.get('tx_hash', 'n/a')}")
          print(f"  Block    : {d.get('block_number', 'n/a')}")
          print(f"  Gas used : {d.get('gas_used', 'n/a')}")
          print(sep)
          PYEOF
