# Integration — runs on push to main/develop and on manual dispatch.
# Uses the `dev` environment; secrets are available but no live signing.
name: integration

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (no live submission)"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  integration-tests:
    name: Integration Tests (dev)
    runs-on: ubuntu-latest
    environment: dev
    env:
      # ── Non-sensitive config (repository variables) ──────────────────────
      CHAIN_ID: ${{ vars.CHAIN_ID }}
      NETWORK: ${{ vars.NETWORK }}
      EXECUTOR_C1_ADDRESS: ${{ vars.EXECUTOR_C1_ADDRESS }}
      EXECUTOR_C2_ADDRESS: ${{ vars.EXECUTOR_C2_ADDRESS }}
      ROUTER_QUICKSWAP: ${{ vars.ROUTER_QUICKSWAP }}
      ROUTER_UNISWAP_V3: ${{ vars.ROUTER_UNISWAP_V3 }}
      SAFE_GAS_MULTIPLIER: ${{ vars.SAFE_GAS_MULTIPLIER }}
      ENABLE_BUNDLE_MODE: ${{ vars.ENABLE_BUNDLE_MODE }}
      # ── Sensitive credentials (environment secrets) ───────────────────────
      POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
      POLYGON_WSS_URL: ${{ secrets.POLYGON_WSS_URL }}
      POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
      # PRIVATE_KEY and RELAY_AUTH_KEY intentionally omitted in dev:
      # dry-run and off-chain validation only.
      DRY_RUN: ${{ inputs.dry_run || 'true' }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ── Rust ──────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: cargo build
        run: cargo build --workspace --locked --release

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Full test suite including integration tests ────────────────────────
      - name: pytest (full suite — live RPC available)
        run: pytest python/apex_omega_core/tests/ -q --tb=short

      # ── Off-chain pipeline dry-run ─────────────────────────────────────────
      - name: Dry-run pipeline
        run: python python/dry_run.py
